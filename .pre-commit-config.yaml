repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        # -ll: report LOW and above (matches CI threshold)
        # -ii: report MEDIUM confidence and above (matches CI threshold)
        # -r: recursive scan
        # Keeps local findings consistent with CI so developers see the
        # same results before pushing (supports the "pre-commit is the
        # fastest option" argument in the security incentives design).
        args: ["-ll", "-ii", "-r", "app"]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2   # updated from v8.18.4 (May 2024 -> 2026)
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files