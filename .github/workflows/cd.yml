# Deploy flow: triggered by signed git tags. Verifies cosign signature
# and provenance before promoting through staging -> production via
# GitHub Environments (manual approval gate on production).
#
# Security invariant: deployments always reference an immutable image
# digest (@sha256:...), never a mutable tag. The tag-triggered path
# resolves the digest from the registry before handing off to deploy jobs.
name: CD

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      image_digest:
        description: "Image digest to deploy (sha256:...)"
        required: true

permissions: {}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    name: Verify signature & provenance
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
      id-token: write
    outputs:
      digest: ${{ steps.resolve.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Resolve image digest
        id: resolve
        env:
          INPUT_DIGEST: ${{ inputs.image_digest }}
          REF_NAME: ${{ github.ref_name }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          if [ -n "$INPUT_DIGEST" ]; then
            # workflow_dispatch: digest provided directly
            DIGEST="$INPUT_DIGEST"
          else
            # tag push: resolve the digest for the pushed tag so we never
            # deploy by mutable tag -- only by immutable digest.
            TAGGED_REF="${REGISTRY}/${IMAGE_NAME}:${REF_NAME}"
            DIGEST=$(docker buildx imagetools inspect "$TAGGED_REF" \
              --format '{{json .Manifest.Digest}}' | tr -d '"')
            if [ -z "$DIGEST" ]; then
              echo "::error::Could not resolve digest for ${TAGGED_REF}"
              exit 1
            fi
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "ref=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved to digest: ${DIGEST}"

      - name: Verify cosign signature (keyless)
        env:
          IMAGE: ${{ steps.resolve.outputs.ref }}
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" "$IMAGE"

      - name: Verify build provenance attestation
        env:
          IMAGE: ${{ steps.resolve.outputs.ref }}
        run: |
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"

  deploy-staging:
    name: Deploy to staging
    needs: verify
    runs-on: ubuntu-24.04
    environment:
      name: staging
      url: https://staging.example.invalid
    permissions:
      contents: read
      id-token: write   # for cloud OIDC federation (e.g. Azure/AWS)
    steps:
      - name: Federated login (placeholder)
        run: echo "Use azure/login@... or aws-actions/configure-aws-credentials@... with OIDC here."

      - name: Deploy (digest-pinned)
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          # Always deploy by digest, never by tag.
          echo "kubectl set image deploy/app app=${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

  deploy-production:
    name: Deploy to production (manual approval)
    needs: [verify, deploy-staging]
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://app.example.invalid
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Federated login (placeholder)
        run: echo "OIDC federation to cloud provider goes here -- no long-lived secrets."

      - name: Deploy (digest-pinned)
        env:
          DIGEST: ${{ needs.verify.outputs.digest }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          # Always deploy by digest, never by tag.
          echo "kubectl set image deploy/app app=${REGISTRY}/${IMAGE_NAME}@${DIGEST}"